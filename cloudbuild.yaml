steps:
  - name: 'hashicorp/terraform:1.9'
    args: ['init', '-backend=false']
    dir: 'terraform'

  - name: 'hashicorp/terraform:1.9'
    args: ['validate']
    dir: 'terraform'

  - name: 'python:3.12-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install dbt-bigquery --quiet
        cd dbt
        dbt build --profiles-dir . --target ci

  - name: 'python:3.12-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install pytest requests google-cloud-pubsub google-cloud-secret-manager --quiet
        cd cloud_functions
        pytest test_main.py -v

options:
  logging: CLOUD_LOGGING_ONLY
